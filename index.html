<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Ramadan Timer</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Ramadan Timer - Countdown to Sehri and Iftar with Bangladesh time. Full Ramadan 2026 calendar, golden theme, English & Bengali. রমজান টাইমার।">
    <meta name="keywords" content="Ramadan timer, Sehri time, Iftar time, Ramadan 2026, Bangladesh time, Ramadan calendar, Islamic timer, রমজান টাইমার, সাহরি, ইফতার">
    <meta name="author" content="Ramadan Timer">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0a1628">
    <link rel="canonical" href="https://tarikulcse31.github.io/ramadan-timer/">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tarikulcse31.github.io/ramadan-timer/">
    <meta property="og:title" content="Ramadan Timer - Sehri & Iftar Countdown">
    <meta property="og:description" content="Ramadan Timer with Bangladesh time. Countdown to Sehri and Iftar, full calendar, 12h/24h, English & Bengali.">
    <meta property="og:locale" content="en_US">
    <meta property="og:locale:alternate" content="bn_BD">
    <meta property="og:site_name" content="Ramadan Timer">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ramadan Timer - Sehri & Iftar Countdown">
    <meta name="twitter:description" content="Ramadan Timer with Bangladesh time. Countdown to Sehri and Iftar, full calendar, English & Bengali.">
    
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    <div class="crescent-moon"></div>
    <button class="fullscreen-btn" id="fullscreen-btn" title="" aria-label="">
        <svg class="fullscreen-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
        <svg class="fullscreen-exit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display: none;">
            <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
        </svg>
    </button>
    <button class="time-format-btn" id="time-format-btn" title="" aria-label="">
        <span id="time-format-text">24h</span>
    </button>
    <button class="language-btn" id="language-btn" title="" aria-label="">
        <span id="language-text">EN</span>
    </button>
    <button class="calendar-btn" id="calendar-btn" title="" aria-label="">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
    </button>
    <div class="container">
        <div class="header">
            <div class="crescent-icon">🌙</div>
            <h1 id="header-title">Ramadan Timer</h1>
            <p class="subtitle" id="header-subtitle">Ramadan Timer</p>
            <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
        </div>
        
        <div class="timer-card">
            <div class="current-day">
                <span id="current-day-text"><span id="ramadan-day-label">Ramadan Day</span>: <span id="ramadan-day">-</span></span>
                <div class="system-time" id="system-time"><span id="current-time-label">Current Time</span>: -</div>
            </div>
            
            <div class="next-event">
                <div class="event-label" id="event-label">Next Event</div>
                <div class="event-name" id="event-name">-</div>
            </div>
            
            <div class="countdown">
                <div class="time-unit" id="days-unit" style="display: none;">
                    <div class="time-value" id="days">00</div>
                    <div class="time-label" id="days-label">Days</div>
                </div>
                <div class="separator" id="days-separator" style="display: none;">:</div>
                <div class="time-unit">
                    <div class="time-value" id="hours">00</div>
                    <div class="time-label" id="hours-label">Hours</div>
                </div>
                <div class="separator">:</div>
                <div class="time-unit">
                    <div class="time-value" id="minutes">00</div>
                    <div class="time-label" id="minutes-label">Minutes</div>
                </div>
                <div class="separator">:</div>
                <div class="time-unit">
                    <div class="time-value" id="seconds">00</div>
                    <div class="time-label" id="seconds-label">Seconds</div>
                </div>
            </div>
            
            <div class="event-time">
                <div class="time-info">
                    <span class="info-label" id="sehri-label">Sehri End Time:</span>
                    <span class="info-value" id="sehri-time">-</span>
                </div>
                <div class="time-info">
                    <span class="info-label" id="iftar-label">Iftar Time:</span>
                    <span class="info-value" id="iftar-time">-</span>
                </div>
            </div>
            
        </div>
    </div>
    
    <!-- Calendar Modal -->
    <div class="modal-overlay" id="calendar-modal">
        <div class="modal-content">
            <div class="modal-header-section">
                <button class="modal-close" id="modal-close">&times;</button>
                <h2 class="calendar-title" id="calendar-title">Ramadan Calendar 2026</h2>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
